<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example: satisfies + const Type Parameters</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 380px; }
        .display { min-height: 60px; margin-bottom: 1.5rem; padding: 1rem; border: 1px dashed #ccc; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; font-weight: bold; gap: 4px; }
        .display span { font-size: 0.85rem; font-weight: normal; color: #666; }

        .autocomplete-wrapper { position: relative; margin-bottom: 1rem; }
        .autocomplete-wrapper input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .autocomplete-wrapper input:focus { border-color: #8e44ad; }

        .suggestions {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: none;
            z-index: 10;
        }
        .suggestion-item {
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            transition: background 0.15s;
        }
        .suggestion-item:hover, .suggestion-item.active { background: #f0e8f8; }
        .suggestion-item .route-name { font-weight: bold; color: #333; flex: 1; }
        .suggestion-item .route-path { font-size: 0.8rem; color: #888; }
        .suggestion-item .badge {
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
            padding: 2px 7px;
            border-radius: 99px;
        }
        .badge-admin { background: #8e44ad; }
        .badge-user  { background: #3498db; }

        .hint { font-size: 0.75rem; color: #aaa; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Route Config Simulation</h3>
        <div id="display" class="display">
            Type a route name to inspect it

        </div>

        <p class="hint">💡 Simulates the autocomplete TypeScript provides thanks to <code>satisfies</code> + <code>&lt;const T&gt;</code></p>

        <div class="autocomplete-wrapper">
            <input
                type="text"
                id="routeInput"
                placeholder="e.g.: home, dashboard..."
                autocomplete="off"
                oninput="onInput()"
                onkeydown="onKeyDown(event)"
                onfocus="showSuggestions()"
                onblur="hideSuggestions()"
            />
            <div class="suggestions" id="suggestions"></div>
        </div>
    </div>

    <script>
        const myAppRoutes = {
            home:      { path: "/",            role: "user" },
            dashboard: { path: "/admin/panel", role: "admin" }
        };

        const routes = Object.entries(myAppRoutes).map(([name, config]) => ({ name, ...config }));
        let activeIndex = -1;

        function onInput() {
            activeIndex = -1;
            showSuggestions();
        }

        function showSuggestions() {
            const query = document.getElementById('routeInput').value.toLowerCase();
            const box = document.getElementById('suggestions');

            const filtered = routes.filter(r => r.name.includes(query));

            if (filtered.length === 0) {
                box.style.display = 'none';
                return;
            }

            box.innerHTML = filtered.map((r, i) => `
                <div
                    class="suggestion-item"
                    data-name="${r.name}"
                    onmousedown="selectRoute('${r.name}')"
                >
                    <span class="route-name">${highlight(r.name, query)}</span>
                    <span class="route-path">${r.path}</span>
                    <span class="badge badge-${r.role}">${r.role}</span>
                </div>
            `).join('');

            box.style.display = 'block';
        }

        function hideSuggestions() {
            setTimeout(() => {
                document.getElementById('suggestions').style.display = 'none';
                activeIndex = -1;
            }, 150);
        }

        function onKeyDown(e) {
            const box = document.getElementById('suggestions');
            const items = box.querySelectorAll('.suggestion-item');

            if (e.key === 'ArrowDown') {
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
            } else if (e.key === 'ArrowUp') {
                activeIndex = Math.max(activeIndex - 1, 0);
            } else if (e.key === 'Enter' && activeIndex >= 0) {
                selectRoute(items[activeIndex].dataset.name);
                return;
            } else {
                return;
            }

            items.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
            e.preventDefault();
        }

        function selectRoute(name) {
            document.getElementById('routeInput').value = name;
            document.getElementById('suggestions').style.display = 'none';
            inspectRoute(name);
        }

        function inspectRoute(name) {
            const display = document.getElementById('display');
            const route = myAppRoutes[name];
            if (!route) return;

            const icon = route.role === "admin" ? "🛡️" : "👤";
            const detail = `path: "${route.path}" | role: "${route.role}"`;
            display.innerHTML = `${icon} <strong>${name}</strong><span>${detail}</span>`;
        }

        function highlight(text, query) {
            if (!query) return text;
            return text.replace(new RegExp(`(${query})`, 'gi'), '<mark style="background:#e8d5f5;border-radius:2px">$1</mark>');
        }
    </script>
</body>
</html>
