<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example: CSS Custom Properties</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-primary: #6366f1;
            --color-accent: #f43f5e;
            --color-success: #22c55e;
            --font-heading: "Georgia", serif;
            --spacing-hero: 20rem;
        }

        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 420px; }
        .card h3 { margin-bottom: 1.5rem; }
        .display { min-height: 100px; margin-bottom: 1.5rem; padding: 1rem; border: 1px dashed #ccc; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; font-weight: bold; gap: 8px; }
        .display span { font-size: 0.85rem; font-weight: normal; color: #666; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 6px; transition: 0.2s; font-weight: bold; color: white; }
        .btn-tokens     { background-color: #6366f1; }
        .btn-convention { background-color: #f43f5e; }
        .btn-opacity    { background-color: #22c55e; }
        .btn-reset      { background-color: #95a5a6; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="card">
        <h3>@theme — CSS Custom Properties</h3>
        <div id="display" class="display">
            Click a button to explore each concept
            <span>Tailwind v4 — design tokens as native CSS variables</span>
        </div>

        <div class="controls">
            <button class="btn-tokens"     onclick="mostrar('tokens')">Design Tokens</button>
            <button class="btn-convention" onclick="mostrar('convention')">Naming Convention</button>
            <button class="btn-opacity"    onclick="mostrar('opacity')">Opacity Operator</button>
            <button class="btn-reset"      onclick="mostrar('reset')">Reset</button>
        </div>
    </div>

    <script>
        function mostrar(tipo) {
            const display = document.getElementById('display');

            switch (tipo) {
                case 'tokens':
                    display.style.background = '#eef2ff';
                    display.style.borderColor = '#6366f1';
                    display.innerHTML = `
                        <code style="background:#e0e7ff; padding:4px 10px; border-radius:4px; font-size:0.9rem; color:#4338ca;">--color-primary: #6366f1</code>
                        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;">
                            <span style="background:#6366f1; color:white; padding:5px 14px; border-radius:5px; font-size:0.85rem;">bg-primary</span>
                            <span style="color:#6366f1; font-size:0.9rem; font-weight:bold; border:2px solid #6366f1; padding:3px 12px; border-radius:5px;">border-primary</span>
                            <span style="color:#6366f1; font-size:0.9rem; font-weight:bold;">text-primary</span>
                        </div>
                        <span>1 token in @theme → bg-primary, text-primary, border-primary</span>`;
                    break;

                case 'convention':
                    display.style.background = '#fff1f2';
                    display.style.borderColor = '#f43f5e';
                    display.innerHTML = `
                        <table style="font-size:0.78rem; border-collapse:collapse; width:100%; text-align:left;">
                            <thead>
                                <tr style="color:#999; font-weight:normal; border-bottom:1px solid #eee;">
                                    <th style="padding:4px 8px;">Prefix</th>
                                    <th style="padding:4px 8px;">Category</th>
                                    <th style="padding:4px 8px;">Generated class</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style="padding:5px 8px;"><code>--color-*</code></td>
                                    <td style="padding:5px 8px;">Colors</td>
                                    <td style="padding:5px 8px; color:#6366f1;"><code>bg-primary, text-accent</code></td>
                                </tr>
                                <tr style="background:#fef2f2;">
                                    <td style="padding:5px 8px;"><code>--font-*</code></td>
                                    <td style="padding:5px 8px;">Fonts</td>
                                    <td style="padding:5px 8px; color:#f43f5e;"><code>font-heading</code></td>
                                </tr>
                                <tr>
                                    <td style="padding:5px 8px;"><code>--spacing-*</code></td>
                                    <td style="padding:5px 8px;">Spacing</td>
                                    <td style="padding:5px 8px; color:#22c55e;"><code>w-hero, p-hero, mt-hero</code></td>
                                </tr>
                            </tbody>
                        </table>
                        <span>prefix in @theme → Tailwind utility category</span>`;
                    break;

                case 'opacity':
                    display.style.background = '#f0fdf4';
                    display.style.borderColor = '#22c55e';
                    display.innerHTML = `
                        <div style="display:flex; gap:10px; align-items:flex-end; justify-content:center;">
                            <div style="text-align:center;">
                                <div style="width:52px; height:52px; background:#6366f1; border-radius:6px; margin-bottom:4px;"></div>
                                <span style="font-size:0.7rem; color:#555; font-weight:normal;">bg-primary</span>
                            </div>
                            <div style="text-align:center;">
                                <div style="width:52px; height:52px; background:rgba(99,102,241,0.75); border-radius:6px; margin-bottom:4px;"></div>
                                <span style="font-size:0.7rem; color:#555; font-weight:normal;">bg-primary/75</span>
                            </div>
                            <div style="text-align:center;">
                                <div style="width:52px; height:52px; background:rgba(99,102,241,0.50); border-radius:6px; margin-bottom:4px;"></div>
                                <span style="font-size:0.7rem; color:#555; font-weight:normal;">bg-primary/50</span>
                            </div>
                            <div style="text-align:center;">
                                <div style="width:52px; height:52px; background:rgba(99,102,241,0.25); border-radius:6px; margin-bottom:4px;"></div>
                                <span style="font-size:0.7rem; color:#555; font-weight:normal;">bg-primary/25</span>
                            </div>
                        </div>
                        <span>bg-primary/50 → hex converted to RGB + opacity applied automatically</span>`;
                    break;

                case 'reset':
                    display.style.background = '';
                    display.style.borderColor = '';
                    display.innerHTML = `
                        Click a button to explore each concept
                        <span>Tailwind v4 — design tokens as native CSS variables</span>`;
                    break;
            }
        }
    </script>
</body>
</html>
